<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: 'Courier New', monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .cyber-border { border: 1px solid #333; box-shadow: 0 0 10px rgba(0, 255, 0, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="p-6">
    <header class="flex-none flex justify-between items-center mb-6 border-b border-gray-800 pb-4 h-16">
        <h1 class="text-3xl font-bold text-green-500">HONEYPOT V3 <span class="text-xs text-white bg-red-600 px-1 rounded animate-pulse">LIVE</span></h1>
        <div class="text-right"><p class="text-green-400 font-bold">SYSTEM ONLINE ●</p></div>
    </header>

    <div class="flex-none grid grid-cols-3 gap-4 mb-6 h-24">
        <div class="bg-[#111] p-4 rounded cyber-border">
            <p class="text-gray-400 text-xs">TOTAL SESSIONS</p>
            <p class="text-3xl font-bold text-white" id="total-sessions">0</p>
        </div>
        <div class="bg-[#111] p-4 rounded cyber-border">
            <p class="text-gray-400 text-xs">SCAMS DETECTED</p>
            <p class="text-3xl font-bold text-red-500" id="scams-detected">0</p>
        </div>
        <div class="bg-[#111] p-4 rounded cyber-border">
            <p class="text-gray-400 text-xs">INTEL POINTS</p>
            <p class="text-3xl font-bold text-blue-400" id="intel-count">0</p>
        </div>
    </div>

    <div class="flex-1 grid grid-cols-3 gap-6 min-h-0">
        <div class="col-span-2 flex flex-col bg-[#111] rounded cyber-border h-full">
            <div class="flex-none p-3 border-b border-gray-800 bg-gray-900">
                <h3 class="font-bold text-green-400">>> LIVE INTERCEPTION LOG</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="live-feed">
                <p class="text-gray-600 italic">Waiting for incoming signals...</p>
            </div>
        </div>

        <div class="col-span-1 flex flex-col bg-[#111] rounded cyber-border h-full">
            <div class="flex-none p-3 border-b border-gray-800 bg-gray-900">
                <h3 class="font-bold text-blue-400">>> EXTRACTED DATA</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="intel-feed"></div>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/dashboard/stats');
                const data = await response.json();
                document.getElementById('total-sessions').innerText = data.total_sessions;
                document.getElementById('scams-detected').innerText = data.scams_detected;
                document.getElementById('intel-count').innerText = data.total_intel;
                
                const feed = document.getElementById('live-feed');
                feed.innerHTML = ''; 
                data.recent_logs.slice().reverse().forEach(log => {
                    let color = 'text-gray-400';
                    if (log.role === 'scammer') color = 'text-red-400';
                    if (log.role === 'agent') color = 'text-green-400';
                    const html = `<div class="border-b border-gray-800 pb-1"><span class="text-xs text-gray-600">[${log.timestamp}]</span> <span class="${color} text-sm font-mono">${log.role.toUpperCase()}: ${log.message}</span></div>`;
                    feed.innerHTML += html;
                });

                const intelDiv = document.getElementById('intel-feed');
                let intelHtml = '';
                data.all_intel.bankAccounts.forEach(i => intelHtml += `<div class="bg-gray-800 p-2 rounded text-xs text-white">🏦 BANK: ${i}</div>`);
                data.all_intel.upiIds.forEach(i => intelHtml += `<div class="bg-gray-800 p-2 rounded text-xs text-white">💸 UPI: ${i}</div>`);
                data.all_intel.phishingLinks.forEach(i => intelHtml += `<div class="bg-gray-800 p-2 rounded text-xs text-red-300">🔗 URL: ${i}</div>`);
                data.all_intel.phoneNumbers.forEach(i => intelHtml += `<div class="bg-gray-800 p-2 rounded text-xs text-yellow-300">📞 TEL: ${i}</div>`);
                intelDiv.innerHTML = intelHtml;
            } catch (error) {}
        }
        setInterval(fetchStats, 2000);
        fetchStats();
    </script>
</body>
</html>
