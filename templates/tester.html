<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS GRID LAYOUT: Header (50px) | Content (Auto) */
        body { 
            display: grid; 
            grid-template-rows: 50px 1fr; 
            height: 100vh; 
            background: #000; 
            color: #fff; 
            font-family: monospace; 
            overflow: hidden; 
        }
        
        /* The main workspace is also a grid of 2 columns */
        #workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            min-height: 0; /* Critical for inner scrolling */
        }

        /* The chat box structure: Header | History (Scroll) | Input */
        .panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Critical */
        }
        
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* Aesthetics */
        .bubble { padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; max-width: 90%; }
        .scammer { background: #331111; color: #ffaaaa; align-self: flex-end; margin-left: auto; }
        .agent { background: #112211; color: #aaffaa; align-self: flex-start; }
    </style>
</head>
<body>

    <header class="flex items-center justify-between px-6 border-b border-gray-800">
        <h1 class="font-bold text-yellow-500">🕵️ SCAM SIMULATOR</h1>
        <div class="text-xs text-gray-500">SESSION: <span id="sess-id" class="text-white">...</span></div>
    </header>

    <div id="workspace">
        
        <div class="panel">
            <div class="p-3 border-b border-gray-800 font-bold text-xs text-gray-500">LIVE CHAT</div>
            
            <div id="chat-box" class="scroll-area flex flex-col">
                <div class="text-center text-xs text-gray-700 mt-4">System Initialized.</div>
            </div>

            <div class="p-3 border-t border-gray-800 bg-[#0a0a0a]">
                <div class="flex gap-2">
                    <input id="msg-input" type="text" placeholder="Type here..." 
                        class="flex-1 bg-black border border-gray-700 p-2 text-white rounded outline-none focus:border-yellow-600"
                        onkeypress="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()" class="bg-yellow-700 hover:bg-yellow-600 text-black font-bold px-4 rounded">SEND</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="p-3 border-b border-gray-800 font-bold text-xs text-gray-500 flex justify-between">
                <span>SYSTEM INTEL</span>
                <button onclick="refreshJson()" class="text-blue-400 hover:underline">Refresh</button>
            </div>
            <div class="scroll-area bg-black">
                <pre id="json-box" class="text-xs text-green-500 p-2 whitespace-pre-wrap font-mono"></pre>
            </div>
        </div>
    </div>

    <script>
        const sid = "test-" + Math.floor(Math.random() * 10000);
        document.getElementById('sess-id').innerText = sid;

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            addBubble(text, 'scammer');
            input.value = '';

            try {
                // Send to API
                const res = await fetch('/scam-check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': 'secret123' },
                    body: JSON.stringify({
                        sessionId: sid,
                        message: { sender: 'scammer', text: text, timestamp: Date.now() },
                        conversationHistory: []
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    setTimeout(() => addBubble(data.reply, 'agent'), 500);
                    refreshJson();
                }
            } catch (e) { console.error(e); }
        }

        function addBubble(text, role) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="bubble ${role}"><strong>${role.toUpperCase()}:</strong> ${text}</div>`;
            box.scrollTop = box.scrollHeight; // Force scroll to bottom
        }

        async function refreshJson() {
            try {
                const res = await fetch(`/api/session/${sid}`);
                const data = await res.json();
                if (data.error) return;
                
                const display = {
                    scamDetected: data.is_scam,
                    extractedIntelligence: data.intelligence,
                    agentNotes: data.agent_notes
                };
                document.getElementById('json-box').innerText = JSON.stringify(display, null, 2);
            } catch (e) {}
        }
        
        // Auto-refresh initially
        setInterval(refreshJson, 3000);
    </script>
</body>
</html>
