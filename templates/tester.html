<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Simulator | Test Your API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force full height and disable window scroll */
        body { background-color: #050505; color: #eee; font-family: monospace; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .chat-bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; word-wrap: break-word; }
        .scammer { background-color: #3f1818; color: #ff9999; border: 1px solid #772222; align-self: flex-end; margin-left: auto; }
        .agent { background-color: #1a2e1a; color: #99ff99; border: 1px solid #225522; align-self: flex-start; }
        
        /* Custom scrollbar for inner containers */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body class="p-4">

    <header class="flex-none flex justify-between items-center mb-4 border-b border-gray-800 pb-2 h-12">
        <h1 class="text-xl font-bold text-yellow-500">🕵️ SCAM SIMULATOR</h1>
        <div class="text-xs text-gray-400">Session ID: <span id="session-display" class="text-white">...</span></div>
    </header>

    <div class="flex-1 flex gap-4 min-h-0">
        
        <div class="flex-1 flex flex-col bg-[#111] rounded border border-gray-800 h-full">
            <h3 class="flex-none p-3 text-sm font-bold text-gray-400 border-b border-gray-800">💬 CONVERSATION</h3>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col">
                <div class="text-center text-xs text-gray-600">System Ready.</div>
            </div>

            <div class="flex-none p-3 border-t border-gray-800 bg-[#0a0a0a]">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="Type message..." 
                        class="flex-1 bg-black border border-gray-700 rounded p-2 text-white outline-none focus:border-yellow-500"
                        onkeypress="handleEnter(event)">
                    <button onclick="sendMessage()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold px-4 rounded">SEND</button>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#111] rounded border border-gray-800 h-full">
            <h3 class="flex-none p-3 text-sm font-bold text-gray-400 border-b border-gray-800">⚡ LIVE ANALYSIS</h3>
            
            <div class="flex-1 overflow-y-auto p-2 bg-black m-2 rounded border border-gray-700 relative">
                 <button onclick="refreshJson()" class="absolute top-2 right-2 bg-gray-800 text-xs px-2 py-1 rounded text-white border border-gray-600 hover:bg-gray-700 z-10">Refresh</button>
                <pre id="json-output" class="text-xs text-green-400 p-2 font-mono whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script>
        const sessionId = "test-session-" + Math.floor(Math.random() * 10000);
        document.getElementById('session-display').innerText = sessionId;
        let msgCount = 0;
        setInterval(refreshJson, 3000);

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            addBubble(text, 'scammer');
            input.value = '';
            
            try {
                const response = await fetch('/scam-check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': 'secret123' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: { sender: 'scammer', text: text, timestamp: Date.now() },
                        conversationHistory: [],
                        metadata: { channel: 'WEB_TEST' }
                    })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    setTimeout(() => addBubble(data.reply, 'agent'), 500);
                    refreshJson(); 
                }
            } catch (err) { console.error(err); }
        }

        function addBubble(text, role) {
            const box = document.getElementById('chat-box');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${role}`;
            bubble.innerHTML = `<strong>${role.toUpperCase()}:</strong> ${text}`;
            box.appendChild(bubble);
            box.scrollTop = box.scrollHeight; // Auto scroll to bottom
        }

        async function refreshJson() {
            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const sessionData = await res.json();
                if (sessionData.error) return;
                
                const guviFormat = {
                    "status": "success",
                    "data": {
                        "finalOutput": {
                            "scamDetected": sessionData.is_scam,
                            "extractedIntelligence": sessionData.intelligence,
                            "agentNotes": sessionData.agent_notes
                        }
                    }
                };
                document.getElementById('json-output').innerText = JSON.stringify(guviFormat, null, 2);
            } catch (e) {}
        }
    </script>
</body>
</html>
