<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Simulator | Test Your API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { cyber: '#0f0', darkbg: '#050505', panel: '#111' } } }
        }
    </script>
    <style>
        body { background-color: #050505; color: #eee; font-family: 'Segoe UI', monospace; }
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        .scammer { background-color: #3f1818; color: #ff9999; border: 1px solid #772222; align-self: flex-end; margin-left: auto; }
        .agent { background-color: #1a2e1a; color: #99ff99; border: 1px solid #225522; align-self: flex-start; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
        <h1 class="text-xl font-bold text-yellow-500">🕵️ SCAM SIMULATOR <span class="text-xs text-gray-500 ml-2">Roleplay as the Attacker</span></h1>
        <div class="text-xs text-gray-400">
            Session ID: <span id="session-display" class="font-mono text-white">Generating...</span>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4 flex-grow overflow-hidden">
        
        <div class="flex flex-col bg-panel rounded border border-gray-800 p-4">
            <h3 class="text-sm font-bold text-gray-400 mb-2 border-b border-gray-800 pb-1">💬 CONVERSATION</h3>
            
            <div id="chat-box" class="flex-grow overflow-y-auto flex flex-col space-y-2 p-2">
                <div class="text-center text-xs text-gray-600 mt-4">Start the conversation by sending a "scam" message below.</div>
            </div>

            <div class="mt-4 flex gap-2">
                <input type="text" id="user-input" placeholder="Type a scam message..." 
                    class="flex-grow bg-black border border-gray-700 rounded p-2 text-white focus:border-yellow-500 outline-none"
                    onkeypress="handleEnter(event)">
                <button onclick="sendMessage()" 
                    class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold px-4 rounded transition">
                    SEND
                </button>
            </div>
        </div>

        <div class="flex flex-col bg-panel rounded border border-gray-800 p-4">
            <h3 class="text-sm font-bold text-gray-400 mb-2 border-b border-gray-800 pb-1">⚡ SYSTEM ANALYSIS (LIVE)</h3>
            
            <div class="flex gap-2 mb-2 text-xs">
                <div id="status-badge" class="px-2 py-1 bg-gray-800 rounded text-gray-400">WAITING</div>
                <div class="px-2 py-1 bg-gray-800 rounded text-gray-300">Msgs: <span id="msg-count">0</span></div>
            </div>

            <div class="flex-grow bg-black border border-gray-700 rounded p-2 overflow-y-auto relative group">
                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition">
                    <button onclick="refreshJson()" class="bg-gray-800 text-xs px-2 py-1 rounded text-white hover:bg-gray-700">Refresh JSON</button>
                </div>
                <pre id="json-output" class="text-xs text-green-400 font-mono">
{
  "status": "waiting_for_input",
  "data": {}
}
                </pre>
            </div>
        </div>
    </div>

    <script>
        // Generate a random Session ID for this test
        const sessionId = "test-session-" + Math.floor(Math.random() * 10000);
        document.getElementById('session-display').innerText = sessionId;
        let msgCount = 0;

        // Auto-refresh JSON every 3 seconds
        setInterval(refreshJson, 3000);

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            // 1. Add Scammer Message to UI
            addBubble(text, 'scammer');
            input.value = '';
            msgCount++;
            
            // 2. Send to API
            try {
                const response = await fetch('/scam-check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'secret123' // Hardcoded for local testing
                    },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: {
                            sender: 'scammer',
                            text: text,
                            timestamp: Date.now()
                        },
                        conversationHistory: [], // Only sending current msg for simplicity in test UI
                        metadata: { channel: 'WEB_TEST', language: 'en' }
                    })
                });

                const data = await response.json();

                // 3. Add Agent Reply to UI
                if (data.status === 'success') {
                    setTimeout(() => addBubble(data.reply, 'agent'), 500); // Small delay for realism
                    refreshJson(); // Update JSON panel immediately
                }

            } catch (err) {
                console.error(err);
                addBubble("⚠️ API Error: Check console", 'scammer');
            }
        }

        function addBubble(text, role) {
            const box = document.getElementById('chat-box');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${role}`;
            bubble.innerHTML = `<strong>${role.toUpperCase()}:</strong> ${text}`;
            box.appendChild(bubble);
            box.scrollTop = box.scrollHeight;
            
            // Update counts
            if (role === 'agent') msgCount++;
            document.getElementById('msg-count').innerText = msgCount;
        }

        async function refreshJson() {
            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const sessionData = await res.json();

                if (sessionData.error) return;

                // Detect status
                const badge = document.getElementById('status-badge');
                if (sessionData.is_scam) {
                    badge.className = "px-2 py-1 bg-red-900 text-red-200 rounded font-bold animate-pulse";
                    badge.innerText = "⚠️ SCAM DETECTED";
                } else {
                    badge.className = "px-2 py-1 bg-green-900 text-green-200 rounded";
                    badge.innerText = "✅ MONITORING";
                }

                // Format exactly like Guvi
                const guviFormat = {
                    "status": "success",
                    "data": {
                        "processStatus": "active_testing",
                        "conversationHistory": "(Hidden in preview)", 
                        "finalOutput": {
                            "scamDetected": sessionData.is_scam,
                            "totalMessagesExchanged": sessionData.msg_count,
                            "extractedIntelligence": sessionData.intelligence,
                            "agentNotes": sessionData.agent_notes
                        }
                    }
                };

                document.getElementById('json-output').innerText = JSON.stringify(guviFormat, null, 2);
            } catch (e) { console.error("Sync error"); }
        }
    </script>
</body>
</html>
